[workspace]
members = ["cargo:crates/heimdall-sandbox"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Publish jobs to run in CI
publish-jobs = ["homebrew", "./publish-crates", "./publish-npm"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "aarch64-apple-darwin"]
# A GitHub repo to push Homebrew formulas to
tap = "casualjim/homebrew-taps"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Include the ort WebGPU Dawn shared library in archives alongside the binary.
include = [
  "target/release/libwebgpu_dawn.dylib",
  "target/release/libwebgpu_dawn.so",
]
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = true
# Whether to enable GitHub Attestations
github-attestations = true

[dist.github-custom-job-permissions]
publish-crates = { contents = "read" }
publish-npm = { contents = "read", id-token = "write" }

[dist.github-custom-runners]
# Prefer native runners (no cross builds) for Linux and macOS targets.
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
aarch64-apple-darwin = "macos-15"
