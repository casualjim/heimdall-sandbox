[workspace]
members = [
    "crates/heimdall-core",
    "crates/heimdall-process-hardening",
    "crates/heimdall-sandbox",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
clap = { version = "4.5.51", features = ["derive"] }
heimdall-core = { path = "crates/heimdall-core" }
heimdall-process-hardening = { path = "crates/heimdall-process-hardening" }
libc = "0.2.177"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
signal-hook = "0.3.18"
thiserror = "2.0.17"
